<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Probikestock · Apps & outils</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #fafbfd; color: #0e1b4d; display: flex; justify-content: center; padding: 4rem 1.2rem; }
    .wrap { max-width: 560px; width: 100%; }
    .eyebrow { text-transform: uppercase; letter-spacing: .14em; font-size: .72rem; font-weight: 700; color: #4770db; margin-bottom: .8rem; }
    h1 { font-size: 1.9rem; font-weight: 800; letter-spacing: -.01em; margin-bottom: .5rem; }
    .sub { color: #5a6485; line-height: 1.6; margin-bottom: 2.4rem; }
    a.card { display: block; text-decoration: none; color: inherit; background: #fff; border: 1px solid rgba(14,27,77,.12); border-radius: 16px; padding: 1.4rem 1.5rem; margin-bottom: 1rem; transition: border-color .15s ease, transform .06s ease; }
    a.card:hover { border-color: #4770db; }
    a.card:active { transform: translateY(1px); }
    .card h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: .3rem; }
    .card p { color: #5a6485; font-size: .92rem; line-height: 1.5; }
    .arrow { float: right; color: #4770db; font-weight: 700; }
    footer { margin-top: 2.5rem; font-size: .8rem; color: #9aa2bd; }
    footer a { color: #4770db; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="eyebrow">Probikestock</p>
    <h1>Apps &amp; outils</h1>
    <p class="sub">Des petits outils gratuits pour les passionné·es de vélo, proposés par Probikestock.</p>

    <a class="card" href="/tdf-2026/">
      <span class="arrow">→</span>
      <h2>🚴 Tour de France 2026</h2>
      <p>Le calendrier des 21 étapes à ajouter à ton agenda : cols, dénivelés, favoris et rappels.</p>
    </a>

    <footer>
      <a href="https://probikestock.com">← Retour sur probikestock.com</a>
    </footer>
  </div>
</body>
</html>
